syntax = "proto3";

package a2l.v1;

// ---------------------------------------------------------------------------
// ASAP2 data-type enum.
// Source: docs/spec_corpus/tables/mcd2mc/predefined_data_types.md (datatype)
// ---------------------------------------------------------------------------
enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  DATA_TYPE_UBYTE      = 1;
  DATA_TYPE_SBYTE      = 2;
  DATA_TYPE_UWORD      = 3;
  DATA_TYPE_SWORD      = 4;
  DATA_TYPE_ULONG      = 5;
  DATA_TYPE_SLONG      = 6;
  DATA_TYPE_A_UINT64   = 7;
  DATA_TYPE_A_INT64    = 8;
  DATA_TYPE_FLOAT16_IEEE = 9;
  DATA_TYPE_FLOAT32_IEEE = 10;
  DATA_TYPE_FLOAT64_IEEE = 11;
}

// ---------------------------------------------------------------------------
// Byte-order enum.
// Source: docs/spec_corpus/tables/mcd2mc/predefined_data_types.md (byteorder)
//         docs/spec_corpus/tables/mcd2mc/byte_order_layout.md
// ---------------------------------------------------------------------------
enum ByteOrder {
  BYTE_ORDER_UNSPECIFIED      = 0;
  BYTE_ORDER_LITTLE_ENDIAN    = 1;  // MSB_LAST / Intel
  BYTE_ORDER_BIG_ENDIAN       = 2;  // MSB_FIRST / Motorola
  BYTE_ORDER_MSB_FIRST_MSW_LAST  = 3;
  BYTE_ORDER_MSB_LAST_MSW_FIRST  = 4;
}

// ---------------------------------------------------------------------------
// Index order for multi-dimensional data.
// Source: docs/spec_corpus/tables/mcd2mc/predefined_data_types.md (indexorder)
// ---------------------------------------------------------------------------
enum IndexOrder {
  INDEX_ORDER_UNSPECIFIED = 0;
  INDEX_ORDER_INCR        = 1;
  INDEX_ORDER_DECR        = 2;
}

// ---------------------------------------------------------------------------
// Characteristic type.
// Source: docs/spec_corpus/spec_cards/characteristic.md (type field)
// ---------------------------------------------------------------------------
enum CharacteristicType {
  CHARACTERISTIC_TYPE_UNSPECIFIED = 0;
  CHARACTERISTIC_TYPE_ASCII       = 1;
  CHARACTERISTIC_TYPE_CURVE       = 2;
  CHARACTERISTIC_TYPE_MAP         = 3;
  CHARACTERISTIC_TYPE_CUBOID      = 4;
  CHARACTERISTIC_TYPE_CUBE_4      = 5;
  CHARACTERISTIC_TYPE_CUBE_5      = 6;
  CHARACTERISTIC_TYPE_VAL_BLK     = 7;
  CHARACTERISTIC_TYPE_VALUE       = 8;
}

// ---------------------------------------------------------------------------
