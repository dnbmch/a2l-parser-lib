  MONOTONY_MONOTONOUS      = 5;
  MONOTONY_STRICT_MON      = 6;
  MONOTONY_NOT_MON         = 7;
}

// ---------------------------------------------------------------------------
// Axis attribute (type of axis description).
// Source: docs/spec_corpus/spec_cards/axis_descr.md (attribute field)
