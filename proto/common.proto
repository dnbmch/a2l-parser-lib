  MATRIX_LAYOUT_ROW_DIR     = 1;
  MATRIX_LAYOUT_COL_DIR     = 2;
}

// ---------------------------------------------------------------------------
// Calibration access mode.
// Source: ASAP2 1.7.1 page 74 (CALIBRATION_ACCESS)
//         docs/spec_corpus/spec_cards/axis_pts.md
// Shared by AXIS_PTS, CHARACTERISTIC, and BLOB.
// Supersedes READ_ONLY since ASAM MCD-2 MC V1.4.
// ---------------------------------------------------------------------------
enum CalibrationAccess {
  CALIBRATION_ACCESS_UNSPECIFIED      = 0;
  CALIBRATION_ACCESS_CALIBRATION      = 1;
  CALIBRATION_ACCESS_NO_CALIBRATION   = 2;
  CALIBRATION_ACCESS_NOT_IN_MCD_SYSTEM = 3;
  CALIBRATION_ACCESS_OFFLINE_CALIBRATION = 4;
}

// ---------------------------------------------------------------------------
// Variant naming convention.
// Source: ASAM MCD-2 MC V1.7.1 (VAR_NAMING keyword)
// ---------------------------------------------------------------------------
enum VarNaming {
  VAR_NAMING_UNSPECIFIED = 0;
  VAR_NAMING_NUMERIC     = 1;
}
